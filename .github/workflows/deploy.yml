name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # או master, תלוי בשם הענף שלך

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # התיקייה שנוצרת אחרי הבנייה
          branch: gh-pages # הענף שעליו ישב האתר המוכן
